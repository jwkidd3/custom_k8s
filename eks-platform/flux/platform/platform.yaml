# ─── ClusterIssuer (Let's Encrypt) ─────────────────────────────────────────
# REQUIRES DNS: Uncomment after setting enable_dns = true in Terraform
#
# apiVersion: cert-manager.io/v1
# kind: ClusterIssuer
# metadata:
#   name: letsencrypt-prod
# spec:
#   acme:
#     email: admin@example.com
#     server: https://acme-v02.api.letsencrypt.org/directory
#     privateKeySecretRef:
#       name: letsencrypt-prod-key
#     solvers:
#       - dns01:
#           route53:
#             region: us-east-2
---
# ─── Platform Gateway (HTTP only — add TLS listener when DNS is configured) ─
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    # REQUIRES DNS: Uncomment for TLS
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - name: platform-tls
    #   hostname: "*.example.com"
---
# ─── Blackbox Probes ───────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-endpoints
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc:9115
  targets:
    staticConfig:
      static:
        - http://vault.vault.svc.cluster.local:8200/v1/sys/health
        # Add external endpoints when DNS is configured
        # - https://example.com
