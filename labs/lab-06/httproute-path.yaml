apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: path-route
  namespace: lab06-$STUDENT_NAME
spec:
  parentRefs:
    - name: lab-gateway
      sectionName: http
  hostnames:
    - "path-$STUDENT_NAME.lab.local"
  rules:
    # Longer prefixes take precedence, so /v1 and /v2 win over the / default.
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: app-v1-svc
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /v2
      backendRefs:
        - name: app-v2-svc
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-v1-svc
          port: 80
