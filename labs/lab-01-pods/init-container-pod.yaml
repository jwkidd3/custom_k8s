apiVersion: v1
kind: Pod
metadata:
  name: init-demo
  namespace: lab-pods-$STUDENT_NAME
  labels:
    app: init-demo
spec:
  # Init containers run to completion, in order, BEFORE any app container starts.
  initContainers:
    - name: setup
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Preparing content in the shared volume..."
          echo "<h1>Hello from the app</h1><p>This page was written by the <b>init container</b> before nginx started.</p>" > /work/index.html
          echo "init container finished"
      volumeMounts:
        - name: content
          mountPath: /work
  containers:
    - name: web
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: content
          mountPath: /usr/share/nginx/html
  volumes:
    - name: content
      emptyDir: {}
