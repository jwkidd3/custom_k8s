apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # Name MUST be <plural>.<group>. Per-student group keeps this cluster-scoped
  # object from colliding with other students.
  name: websites.$STUDENT_NAME.example.com
spec:
  group: $STUDENT_NAME.example.com
  scope: Namespaced
  names:
    plural: websites
    singular: website
    kind: Website
    shortNames: [ws]
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [domain, replicas]
              properties:
                domain:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                theme:
                  type: string
                  enum: [light, dark]
                  default: light
      additionalPrinterColumns:
        - name: Domain
          type: string
          jsonPath: .spec.domain
        - name: Replicas
          type: integer
          jsonPath: .spec.replicas
        - name: Theme
          type: string
          jsonPath: .spec.theme
