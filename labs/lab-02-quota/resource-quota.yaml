apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-quota
  namespace: quota-$STUDENT_NAME
spec:
  hard:
    # Aggregate compute the namespace may request/limit across all Pods.
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    # Object counts.
    pods: "10"
    persistentvolumeclaims: "4"
    count/deployments.apps: "5"
