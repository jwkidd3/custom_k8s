apiVersion: batch/v1
kind: Job
metadata:
  name: batch-parallel
  namespace: lab-jobs-$STUDENT_NAME
spec:
  # Run 6 successful completions total, up to 3 Pods at a time.
  completions: 6
  parallelism: 3
  backoffLimit: 4
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "worker $HOSTNAME starting"
              sleep 3
              echo "worker $HOSTNAME done"
