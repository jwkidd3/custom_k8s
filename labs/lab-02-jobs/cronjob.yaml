apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cron
  namespace: lab-jobs-$STUDENT_NAME
spec:
  # Standard cron syntax — here, every minute.
  schedule: "*/1 * * * *"
  # Don't start a new run if the previous one is still going.
  concurrencyPolicy: Forbid
  # Keep the last few Jobs around for inspection; prune the rest.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: hello
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  echo "CronJob fired at $(date)"
                  echo "Hello from the scheduled job"
