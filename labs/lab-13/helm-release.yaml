apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lab-podinfo-$STUDENT_NAME
  namespace: flux-lab-$STUDENT_NAME
spec:
  interval: 15m
  chart:
    spec:
      chart: podinfo
      version: ">=6.0.0 <7.0.0"
      sourceRef:
        kind: HelmRepository
        name: podinfo-$STUDENT_NAME
        namespace: flux-system
  values:
    replicaCount: 2
    service: { type: ClusterIP }
  install:
    remediation: { retries: 3 }
  upgrade:
    remediation: { retries: 3, strategy: rollback }
